services:
  node1:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["--id", "node-1", "--listen", "0.0.0.0:9001", "--transport", "tcp"]
    ports:
      - "9001:9001"

  node2:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["--id", "node-2", "--listen", "0.0.0.0:9002", "--transport", "tcp"]
    ports:
      - "9002:9002"

  node3:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["--id", "node-3", "--listen", "0.0.0.0:9003", "--transport", "tcp"]
    ports:
      - "9003:9003"

